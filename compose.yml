services:
  reaction-bot:
    build: .
    restart: unless-stopped
    volumes:
      - ./config/.env:/app/config/.env:ro
      - ./data/emojis_processed.json:/app/data/emojis_processed.json:ro
    environment:
      - TZ=Asia/Tokyo
    command: ["python", "main.py", "--mode", "bot"]

  # Preprocessing service for emoji data
  preprocess:
    build: .
    user: "0:0" # rootユーザーとして実行
    volumes:
      - ./config/.env:/app/config/.env:ro
      - ./data/emojis_raw.json:/app/data/emojis_raw.json
      - ./data/emojis_processed.json:/app/data/emojis_processed.json
    command: ["python", "main.py", "--mode", "preprocess"]
    profiles:
      - preprocess
